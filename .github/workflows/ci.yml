name: CI

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      # 1. Compilación
      - name: Compile
        run: mvn clean compile -B

      # 2. Tests
      - name: Run tests
        run: mvn test -B -DtrimStackTrace=false

      # 3. Verificación final
      - name: Verify package
        run: mvn verify -B